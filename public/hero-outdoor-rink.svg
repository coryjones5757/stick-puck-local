<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Outdoor ice rink with mountains">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="55%" stop-color="#c8e3ff"/>
      <stop offset="100%" stop-color="#e8f2fc"/>
    </linearGradient>
    <linearGradient id="ice" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eaf6ff"/>
      <stop offset="100%" stop-color="#b8d9f0"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9e6"/>
      <stop offset="100%" stop-color="#ffe4a8"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#sky)"/>
  <circle cx="720" cy="95" r="48" fill="url(#sun)" opacity="0.9"/>
  <!-- mountains -->
  <path fill="#6b8cae" d="M0 310 L140 165 L260 290 L380 140 L520 280 L640 120 L780 270 L900 180 L900 520 L0 520 Z" opacity="0.85"/>
  <path fill="#4a6d8c" d="M0 340 L120 220 L220 320 L340 200 L480 335 L600 210 L740 318 L900 250 L900 520 L0 520 Z" opacity="0.9"/>
  <!-- trees -->
  <g fill="#3d5c47" opacity="0.9">
    <path d="M60 320 L80 270 L100 320 Z"/>
    <path d="M85 330 L108 275 L130 330 Z"/>
    <path d="M800 315 L825 255 L850 315 Z"/>
  </g>
  <!-- ice surface -->
  <path fill="url(#ice)" d="M0 360 Q200 330 450 345 T900 355 L900 520 L0 520 Z" filter="url(#soft)"/>
  <path fill="none" stroke="#94b8d4" stroke-width="1.5" opacity="0.5" d="M40 395 Q450 375 860 400"/>
  <path fill="none" stroke="#94b8d4" stroke-width="1" opacity="0.35" d="M60 425 Q450 405 840 430"/>
  <!-- dasher board hint -->
  <rect x="40" y="335" width="820" height="8" rx="2" fill="#1e3a5f" opacity="0.35"/>
  <!-- kid skater (silhouette + jacket) -->
  <g transform="translate(480 310)">
    <ellipse cx="0" cy="88" rx="38" ry="5" fill="#1e293b" opacity="0.18"/>
    <!-- body -->
    <path fill="#dc2626" d="M-12 20 L12 20 L14 48 L-14 48 Z"/>
    <circle cx="0" cy="8" r="14" fill="#fecdd3"/>
    <path fill="#1e3a5f" d="M-16 22 L-35 36 L-38 44 L-26 40 L-14 28 Z"/>
    <path fill="#1e3a5f" d="M16 22 L35 36 L38 44 L26 40 L14 28 Z"/>
    <!-- legs / skates -->
    <path fill="#1e293b" d="M-8 48 L-12 78 L-22 82 L-18 86 L4 86 L2 48 Z"/>
    <path fill="#1e293b" d="M8 48 L12 78 L22 82 L18 86 L-4 86 L-2 48 Z"/>
    <!-- stick -->
    <path stroke="#334155" stroke-width="4" stroke-linecap="round" d="M14 30 L48 8"/>
    <circle cx="52" cy="5" r="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  </g>
</svg>
